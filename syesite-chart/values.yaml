replicaCount: 1
namespace: "syepsite"
image:
  repository: docker.io/syedev/syesite
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "ga-2026.02.25-2112"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: "syeapp"
podAnnotations: {}
podLabels: {}
podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 80
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: shengjunye.me
      paths:
        - path: /
          pathType: ImplementationSpecific
    - host: www.shengjunye.me
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: shengjunye-me-tls-skmls
      hosts:
        - shengjunye.me
        - www.shengjunye.me
resources: {}
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80
# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true
nodeSelector: {}
tolerations: []
affinity: {}